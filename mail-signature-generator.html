<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cofinpro Mail Signature Generator</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --accent: #0078d4;
        --accent-orange: #fb923c;
        --accent-orange-2: #f97316;
        --accent-2: #005ea6;
        --border: #e6e6e6;
        --radius: 10px;
        --muted: #6b7280;
        --shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        max-width: 920px;
        margin: 40px auto;
        padding: 20px;
        background-color: var(--bg);
        color: #111827;
      }
      h1 {
        margin: 0 0 6px 0;
        font-size: 1.4rem;
      }
      p {
        margin: 0 0 16px 0;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .signature-form {
        background: linear-gradient(180deg, #ffffff, #fbfdff);
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
      }
      .form-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        flex: 1 1 200px;
        min-width: 160px;
        box-sizing: border-box;
      }
      label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      input,
      select {
        padding: 10px 12px;
        border: 1px solid #e9eef3;
        border-radius: 8px;
        background: #fff;
        font-size: 14px;
        box-shadow: 0 1px 0 rgba(16, 24, 40, 0.02);
        transition:
          box-shadow 0.12s ease,
          border-color 0.12s ease,
          transform 0.08s ease;
        width: 100%;
        box-sizing: border-box;
      }
      input:focus,
      select:focus {
        outline: none;
        box-shadow: 0 8px 20px rgba(0, 120, 212, 0.08);
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .preset-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        border: none;
      }

      .signature-container {
        background: var(--card);
        padding: 22px;
        border-radius: calc(var(--radius) - 2px);
        box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
        border: 1px solid rgba(0, 0, 0, 0.04);
        min-height: 80px;
        max-width: 680px;
        margin-left: auto;
      }

      /* layout for preview column: right-align the copy button while keeping signature full-width */
      .preview-column {
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .preview-column .preview-note {
        display: flex;
        justify-content: flex-end;
        margin: 0 0 12px 0;
        gap: 8px;
        align-items: center;
      }

      /* copy button styling */
      #copySignatureBtn {
        padding: 8px 12px;
        background: linear-gradient(
          90deg,
          var(--accent-orange),
          var(--accent-orange-2)
        );
        color: white;
        border: none;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 120, 212, 0.14);
        display: inline-flex;
        gap: 8px;
        align-items: center;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.08s ease,
          box-shadow 0.12s ease;
      }
      #copySignatureBtn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      #copySignatureBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(249, 115, 22, 0.22);
      }
      #copySignatureBtn:active {
        transform: translateY(0);
      }

      @media (min-width: 900px) {
        .layout {
          grid-template-columns: 360px 1fr;
        }
        .signature-form {
          order: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>Cofinpro Mail Signature</h1>
    <div class="layout">
      <div class="signature-form" aria-hidden="false">
        <div class="form-row">
          <div class="form-field">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" list="firstNameList" />
          </div>
          <div class="form-field">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" list="lastNameList" />
          </div>
        </div>

        <div class="form-row" style="margin-top: 8px">
          <div class="form-field">
            <label for="jobTitle">Job title</label>
            <input id="jobTitle" name="jobTitle" />
          </div>
        </div>

        <div class="form-row" style="margin-top: 8px">
          <div class="form-field">
            <label for="location">Location</label>
            <select id="location" name="location">
              <option value="">-- Select location --</option>
              <option value="FRANKFURT">Frankfurt</option>
              <option value="BERLIN">Berlin</option>
              <option value="MÜNCHEN">München</option>
              <option value="KARLSRUHE">Karlsruhe</option>
              <option value="KÖLN">Köln</option>
              <option value="HANNOVER">Hannover</option>
              <option value="STUTTGART">Stuttgart</option>
            </select>
          </div>
        </div>

        <datalist id="firstNameList"></datalist>
        <datalist id="lastNameList"></datalist>

        <div class="form-row" style="margin-top: 8px">
          <div class="form-field">
            <label for="mobile">Mobile</label>
            <input id="mobile" name="mobile" />
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" />
          </div>
        </div>
      </div>

      <div class="preview-column">
        <p class="preview-note">
          Just copy and paste the generated signature into your email client:
          <button
            id="copySignatureBtn"
            type="button"
            title="Copy signature"
            aria-label="Copy signature"
            class="btn"
          >
            <svg
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M16 1H4a1 1 0 0 0-1 1v12h2V3h11V1zM20 5H8a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zm-1 14H9V7h10v12z"
              />
            </svg>
          </button>
        </p>
        <div class="signature-container" id="preview"></div>
      </div>
    </div>
    <script defer src="mail-signature-generator.js"></script>
  </body>
</html>
