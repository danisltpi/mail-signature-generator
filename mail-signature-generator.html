<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cofinpro Mail Signature Generator</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --accent: #0078d4;
        --border: #e6e6e6;
        --radius: 8px;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        max-width: 920px;
        margin: 40px auto;
        padding: 20px;
        background-color: var(--bg);
        color: #111827;
      }
      h1 {
        margin: 0 0 6px 0;
        font-size: 1.4rem;
      }
      p {
        margin: 0 0 16px 0;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .signature-form {
        background: var(--card);
        border-radius: var(--radius);
        padding: 14px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
        border: 1px solid transparent;
      }
      .form-row {
        display: flex;
        gap: 8px;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input,
      select {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fbfbfb;
        font-size: 14px;
      }
      input:focus,
      select:focus {
        outline: none;
        box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.06);
        border-color: var(--accent);
      }

      .preset-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        border: none;
      }

      .signature-container {
        background: var(--card);
        padding: 22px;
        border-radius: var(--radius);
        box-shadow: 0 2px 6px rgba(16, 24, 40, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.03);
        min-height: 80px;
      }

      /* icon-only copy button (neutral) */
      #copySignatureBtn {
        margin-top: 12px;
        padding: 6px;
        background: transparent;
        color: #333;
        border: 1px solid var(--border);
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        cursor: pointer;
      }
      #copySignatureBtn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      #copySignatureBtn:hover {
        background: rgba(0, 0, 0, 0.03);
      }
      #copySignatureBtn:active {
        transform: translateY(1px);
      }

      @media (min-width: 900px) {
        .layout {
          grid-template-columns: 360px 1fr;
        }
        .signature-form {
          order: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>Cofinpro Mail Signature</h1>
    <div class="layout">
      <div class="signature-form" aria-hidden="false">
        <div class="form-row">
          <div class="form-field">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" placeholder="Max" />
          </div>
          <div class="form-field">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" placeholder="Mustermann" />
          </div>
        </div>

        <div class="form-row" style="margin-top: 8px">
          <div class="form-field">
            <label for="jobTitle">Job title</label>
            <input id="jobTitle" name="jobTitle" placeholder="Vorstand" />
          </div>
        </div>

        <div class="form-row" style="margin-top: 8px">
          <div class="form-field">
            <label for="location">Location</label>
            <select id="location" name="location">
              <option value="">-- Select location --</option>
              <option value="FRANKFURT">Frankfurt</option>
              <option value="BERLIN">Berlin</option>
              <option value="MÜNCHEN">München</option>
              <option value="KARLSRUHE">Karlsruhe</option>
              <option value="KÖLN">Köln</option>
              <option value="HANNOVER">Hannover</option>
              <option value="STUTTGART">Stuttgart</option>
            </select>
          </div>
        </div>

        <div class="form-row" style="margin-top: 8px">
          <div class="form-field">
            <label for="mobile">Mobile</label>
            <input id="mobile" name="mobile" placeholder="+49 170 1234567" />
          </div>
          <!-- <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" placeholder="you@company.com" />
          </div> -->
        </div>
      </div>

      <div>
        <p>
          This signature is generated automatically. Just copy and paste it into
          your email client.
        </p>
        <div class="signature-container" id="preview"></div>
        <button
          id="copySignatureBtn"
          type="button"
          title="Copy signature"
          aria-label="Copy signature"
          class="btn"
        >
          <svg
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M16 1H4a1 1 0 0 0-1 1v12h2V3h11V1zM20 5H8a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zm-1 14H9V7h10v12z"
            />
          </svg>
        </button>
      </div>
    </div>
    <script defer src="mail-signature-generator.js"></script>
  </body>
</html>
